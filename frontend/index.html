<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI校园交友系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="logo">
                <h1>🎓 AI校园交友</h1>
                <p>智能匹配，遇见美好的你</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                <button class="tab-btn" onclick="switchTab('register')">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" name="username" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" name="password" required>
                </div>
                <button type="submit" class="btn-primary">登录</button>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" name="username" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" name="password" required>
                </div>
                <div class="form-group">
                    <label for="studentId">学号（可选）</label>
                    <input type="text" id="studentId" name="student_id">
                </div>
                <div class="form-group">
                    <label for="university">学校（可选）</label>
                    <input type="text" id="university" name="university" placeholder="例如：清华大学">
                </div>
                <div class="form-group">
                    <label for="major">专业（可选）</label>
                    <input type="text" id="major" name="major" placeholder="例如：计算机科学">
                </div>
                <div class="form-group">
                    <label for="grade">年级（可选）</label>
                    <input type="text" id="grade" name="grade" placeholder="例如：2023">
                </div>
                <button type="submit" class="btn-primary">注册</button>
            </form>

            <div id="message" class="message" style="display: none;"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

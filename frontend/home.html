<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI校园交友系统 - 发现</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>🎓 AI校园交友</h1>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="location.href='/profile.html'">个人资料</button>
            <button class="btn-secondary" onclick="location.href='/chat-list.html'">消息</button>
            <button class="btn-secondary" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="container">
        <div id="userCard" class="user-card" style="display: none;">
            <div class="user-avatar" id="userAvatar">
                👤
            </div>
            <div class="user-info">
                <h2 id="userName"></h2>
                <p id="userUniversity"></p>
                <p id="userMajor"></p>
                <p id="userGrade"></p>
                <p id="userBio"></p>
                <div class="user-interests" id="userInterests"></div>
            </div>
            <div class="action-buttons">
                <button class="btn-pass" onclick="passUser()">跳过</button>
                <button class="btn-like" onclick="likeUser()">喜欢</button>
            </div>
        </div>

        <div id="noMoreUsers" style="display: none; text-align: center; color: white; font-size: 1.2em; margin-top: 50px;">
            <p>暂无更多推荐用户</p>
            <p>请稍后再来查看</p>
        </div>

        <div id="loading" style="text-align: center; color: white; font-size: 1.2em; margin-top: 50px;">
            加载中...
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/matching.js"></script>
</body>
</html>
